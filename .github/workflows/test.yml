name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # smart-whisper compiles a native addon (whisper.cpp) via node-gyp on install.
      # The test suite only exercises the pure-JS HTTP API, so skip install scripts
      # to avoid an unnecessary (and fragile) native build on the CI runner.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Print npm logs on failure
        if: failure()
        run: cat ~/.npm/_logs/*.log

      - name: Run tests
        run: npm test
